name: Daily Horizon Summary

on:
  schedule:
    - cron: '0 23 * * *'  # Runs daily at 07:00 Asia/Shanghai (23:00 UTC)
  workflow_dispatch:      # Allow manual trigger

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Prepare GitHub Actions config
        run: cp data/config.github.json data/config.json

      - name: Sync Folo subscriptions
        env:
          FOLO_OPML_URL: ${{ secrets.FOLO_OPML_URL }}
          FOLO_OPML_AUTH_HEADER: ${{ secrets.FOLO_OPML_AUTH_HEADER }}
          FOLO_RSSHUB_HOST: rss.toalan.com
        run: python scripts/sync_folo_opml.py --config data/config.json

      - name: Run Horizon
        env:
          # Map secrets to environment variables expected by config.json
          # Modify these based on your data/config.github.json provider settings
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          LWN_KEY: ${{ secrets.LWN_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          HORIZON_WEBHOOK_URL: ${{ secrets.HORIZON_WEBHOOK_URL }}
        run: uv run horizon --hours 24

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true

      - name: Notify Bark
        env:
          BARK_URL: ${{ secrets.BARK_URL }}
          PAGE_URL: https://news.toalan.com
        run: |
          if [ -z "$BARK_URL" ]; then
            echo "BARK_URL secret is not set; skipping Bark notification."
            exit 0
          fi

          payload="$(python - <<'PY'
          import json
          import os

          date = os.environ.get("DATE", "")
          page_url = os.environ.get("PAGE_URL", "https://news.toalan.com")
          print(json.dumps({
              "title": "Horizon Daily 已生成",
              "body": f"{date} 重点信息已更新，点击查看。",
              "url": page_url,
              "group": "Horizon",
          }, ensure_ascii=False))
          PY
          )"

          curl --fail --silent --show-error \
            --retry 3 \
            --max-time 20 \
            --request POST "$BARK_URL" \
            --header "Content-Type: application/json; charset=utf-8" \
            --data "$payload"
