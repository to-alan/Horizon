name: Test Bark Notification

on:
  workflow_dispatch:

jobs:
  test-bark:
    runs-on: ubuntu-latest
    steps:
      - name: Send Bark test notification
        env:
          BARK_URL: ${{ secrets.BARK_URL }}
        run: |
          if [ -z "$BARK_URL" ]; then
            echo "BARK_URL secret is not set."
            exit 1
          fi

          curl --fail --silent --show-error \
            --retry 3 \
            --max-time 20 \
            --request POST "$BARK_URL" \
            --header "Content-Type: application/json; charset=utf-8" \
            --data '{"title":"Horizon Actions 测试","body":"BARK_URL Secret 已接通，点击打开日报。","url":"https://news.toalan.com","group":"Horizon"}'
